<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAJOR — Simulateur d'Événement Majeur</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--fond:#080c14;--panneau:#0f1628;--panneau2:#161e35;--bordure:#1e2a4a;
--rouge:#e63946;--rouge-sombre:#8b1a22;--ambre:#f4a261;--vert:#2ec4b2;--bleu:#4361ee;
--t1:#e63946;--t2:#f4a261;--t3:#2ec4b2;--dcd:#6b7280;
--texte:#d4d8e8;--texte2:#8892b0;--blanc:#f0f2f8;
--police-titre:'Orbitron',monospace;--police-mono:'Share Tech Mono',monospace;--police-corps:'Exo 2',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--fond);color:var(--texte);font-family:var(--police-corps)}
#ecran-chargement{position:fixed;inset:0;z-index:9999;background:var(--fond);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#ecran-chargement.masque{opacity:0;pointer-events:none}
#ecran-chargement h1{font-family:var(--police-titre);font-size:3rem;color:var(--rouge);letter-spacing:.4em;margin-bottom:2rem;animation:pulse-titre 2s ease-in-out infinite}
.barre-chargement{width:300px;height:4px;background:var(--panneau2);border-radius:2px;overflow:hidden}
.barre-chargement div{height:100%;width:0%;background:linear-gradient(90deg,var(--rouge),var(--ambre));border-radius:2px;transition:width .3s}
@keyframes pulse-titre{0%,100%{opacity:.6;text-shadow:0 0 20px rgba(230,57,70,.3)}50%{opacity:1;text-shadow:0 0 40px rgba(230,57,70,.6)}}

#menu-principal{position:fixed;inset:0;z-index:100;background:var(--fond);display:none;flex-direction:column;align-items:center;overflow-y:auto}
#menu-principal.actif{display:flex}
.menu-entete{padding:3rem 2rem 1rem;text-align:center;width:100%;max-width:900px}
.menu-entete h1{font-family:var(--police-titre);font-size:2.8rem;color:var(--rouge);letter-spacing:.3em;margin-bottom:.5rem}
.menu-entete p{color:var(--texte2);font-size:1rem;letter-spacing:.15em;font-weight:300}
.menu-difficulte{display:flex;gap:1rem;justify-content:center;margin:1.5rem 0;flex-wrap:wrap}
.btn-difficulte{padding:.6rem 1.5rem;border:1px solid var(--bordure);background:var(--panneau);color:var(--texte2);font-family:var(--police-mono);font-size:.85rem;cursor:pointer;border-radius:4px;transition:all .3s;letter-spacing:.1em}
.btn-difficulte:hover,.btn-difficulte.actif{border-color:var(--rouge);color:var(--rouge);background:rgba(230,57,70,.08)}
.grille-scenarios{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.2rem;padding:1rem 2rem 3rem;width:100%;max-width:900px}
.carte-scenario{background:var(--panneau);border:1px solid var(--bordure);border-radius:8px;padding:1.5rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.carte-scenario:hover{border-color:var(--rouge);transform:translateY(-4px);box-shadow:0 8px 30px rgba(230,57,70,.15)}
.carte-scenario .icone{font-size:2.5rem;margin-bottom:.8rem;display:block}
.carte-scenario h3{font-family:var(--police-titre);font-size:.9rem;color:var(--blanc);letter-spacing:.1em;margin-bottom:.5rem}
.carte-scenario p{font-size:.8rem;color:var(--texte2);line-height:1.5}
.carte-scenario .badge-victimes{position:absolute;top:1rem;right:1rem;background:rgba(230,57,70,.15);color:var(--rouge);font-family:var(--police-mono);font-size:.7rem;padding:.3rem .6rem;border-radius:3px}

#jeu{position:fixed;inset:0;display:none;grid-template-rows:50px 1fr 140px;grid-template-columns:1fr 380px;background:var(--fond)}
#jeu.actif{display:grid}
.barre-superieure{grid-column:1/-1;background:var(--panneau);border-bottom:1px solid var(--bordure);display:flex;align-items:center;padding:0 1.5rem;gap:2rem}
.logo-barre{font-family:var(--police-titre);font-size:.9rem;color:var(--rouge);letter-spacing:.2em}
.info-phase{display:flex;align-items:center;gap:.8rem}
.etiquette-phase{font-family:var(--police-mono);font-size:.75rem;color:var(--fond);background:var(--rouge);padding:.25rem .7rem;border-radius:3px;letter-spacing:.1em}
.nom-phase{font-size:.85rem;color:var(--texte)}
.info-minuteur{margin-left:auto;display:flex;align-items:center;gap:1.5rem}
.minuteur{font-family:var(--police-mono);font-size:1.3rem;color:var(--ambre);letter-spacing:.15em}
.score-affichage{font-family:var(--police-mono);font-size:.9rem;color:var(--vert)}
.btn-quitter{background:none;border:1px solid var(--bordure);color:var(--texte2);font-family:var(--police-mono);font-size:.7rem;padding:.3rem .8rem;cursor:pointer;border-radius:3px;letter-spacing:.1em;transition:all .3s}
.btn-quitter:hover{border-color:var(--rouge);color:var(--rouge)}

.zone-carte{position:relative;overflow:hidden;background:#060a12}
#carte-canvas{width:100%;height:100%;display:block}
.superposition-carte{position:absolute;top:1rem;left:1rem;display:flex;flex-direction:column;gap:.5rem}
.legende-item{display:flex;align-items:center;gap:.5rem;font-size:.7rem;color:var(--texte2);font-family:var(--police-mono)}
.legende-couleur{width:12px;height:12px;border-radius:2px}
.info-survol{position:absolute;bottom:1rem;left:1rem;background:rgba(15,22,40,.95);border:1px solid var(--bordure);padding:.8rem 1rem;border-radius:6px;font-size:.8rem;display:none;max-width:300px;backdrop-filter:blur(10px)}
.compteur-victimes{position:absolute;top:1rem;right:1rem;display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
.compteur-cat{text-align:center;padding:.4rem .6rem;border-radius:4px;font-family:var(--police-mono);font-size:.7rem;min-width:50px}
.compteur-cat span{display:block;font-size:1.1rem;font-weight:700}

.panneau-lateral{background:var(--panneau);border-left:1px solid var(--bordure);display:flex;flex-direction:column;overflow:hidden}
.onglets-panneau{display:flex;border-bottom:1px solid var(--bordure);flex-shrink:0}
.onglet{flex:1;padding:.7rem;text-align:center;font-family:var(--police-mono);font-size:.7rem;color:var(--texte2);cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;letter-spacing:.05em}
.onglet:hover{color:var(--texte)}
.onglet.actif{color:var(--rouge);border-bottom-color:var(--rouge)}
.contenu-panneau{flex:1;overflow-y:auto;padding:1rem}
.contenu-panneau::-webkit-scrollbar{width:4px}
.contenu-panneau::-webkit-scrollbar-thumb{background:var(--bordure);border-radius:2px}
.section-panneau{display:none}
.section-panneau.actif{display:block}

.panneau-radio{grid-column:1/-1;background:var(--panneau);border-top:1px solid var(--bordure);display:grid;grid-template-columns:1fr 380px;overflow:hidden}
.journal-radio{padding:.8rem 1rem;overflow-y:auto;font-family:var(--police-mono);font-size:.75rem;display:flex;flex-direction:column;gap:.3rem}
.journal-radio::-webkit-scrollbar{width:3px}
.journal-radio::-webkit-scrollbar-thumb{background:var(--bordure)}
.msg-radio{padding:.3rem .5rem;border-radius:3px;line-height:1.4}
.msg-radio.entrant{color:var(--ambre);background:rgba(244,162,97,.05)}
.msg-radio.sortant{color:var(--vert);background:rgba(46,196,178,.05)}
.msg-radio.systeme{color:var(--texte2);font-style:italic}
.msg-radio .horodatage{color:var(--texte2);margin-right:.5rem;font-size:.65rem}
.actions-radio{padding:.8rem;display:flex;flex-direction:column;gap:.5rem;border-left:1px solid var(--bordure)}
.btn-radio{padding:.5rem .8rem;background:var(--panneau2);border:1px solid var(--bordure);color:var(--texte);font-family:var(--police-mono);font-size:.7rem;cursor:pointer;border-radius:4px;transition:all .2s;text-align:left}
.btn-radio:hover{border-color:var(--bleu);background:rgba(67,97,238,.1)}
.btn-radio:disabled{opacity:.3;cursor:not-allowed}

.formulaire-groupe{margin-bottom:1rem}
.formulaire-groupe label{display:block;font-family:var(--police-mono);font-size:.7rem;color:var(--texte2);margin-bottom:.3rem;letter-spacing:.05em}
.formulaire-groupe input,.formulaire-groupe select,.formulaire-groupe textarea{width:100%;padding:.5rem;background:var(--panneau2);border:1px solid var(--bordure);color:var(--texte);font-family:var(--police-mono);font-size:.8rem;border-radius:4px;outline:none;transition:border-color .3s}
.formulaire-groupe input:focus,.formulaire-groupe select:focus,.formulaire-groupe textarea:focus{border-color:var(--bleu)}
.formulaire-groupe textarea{resize:vertical;min-height:60px}
.formulaire-groupe select{cursor:pointer}

.btn-action{display:block;width:100%;padding:.7rem;margin-top:.8rem;font-family:var(--police-mono);font-size:.8rem;letter-spacing:.1em;border:none;border-radius:4px;cursor:pointer;transition:all .3s}
.btn-action.principal{background:var(--rouge);color:var(--blanc)}
.btn-action.principal:hover{background:#c1303c;box-shadow:0 4px 15px rgba(230,57,70,.3)}
.btn-action.secondaire{background:var(--panneau2);border:1px solid var(--bordure);color:var(--texte)}
.btn-action.secondaire:hover{border-color:var(--bleu)}
.btn-action:disabled{opacity:.4;cursor:not-allowed}

.carte-victime{background:var(--panneau2);border:1px solid var(--bordure);border-radius:6px;padding:.8rem;margin-bottom:.6rem;cursor:pointer;transition:all .2s}
.carte-victime:hover{border-color:var(--ambre)}
.carte-victime.selectionnee{border-color:var(--bleu);box-shadow:0 0 15px rgba(67,97,238,.2)}
.carte-victime .entete-victime{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.carte-victime .id-victime{font-family:var(--police-mono);font-size:.8rem;color:var(--blanc)}
.carte-victime .badge-triage{padding:.15rem .5rem;border-radius:3px;font-family:var(--police-mono);font-size:.65rem;font-weight:700}
.carte-victime .detail-victime{font-size:.75rem;color:var(--texte2);line-height:1.4}
.badge-t1{background:rgba(230,57,70,.2);color:var(--t1)}
.badge-t2{background:rgba(244,162,97,.2);color:var(--t2)}
.badge-t3{background:rgba(46,196,178,.2);color:var(--t3)}
.badge-dcd{background:rgba(107,114,128,.2);color:var(--dcd)}
.badge-non{background:rgba(67,97,238,.2);color:var(--bleu)}

.triage-start{background:var(--panneau2);border:1px solid var(--bordure);border-radius:8px;padding:1rem;margin-top:.5rem}
.triage-start h4{font-family:var(--police-mono);font-size:.8rem;color:var(--ambre);margin-bottom:.8rem;letter-spacing:.1em}
.question-triage{margin-bottom:.8rem}
.question-triage p{font-size:.8rem;color:var(--texte);margin-bottom:.5rem}
.boutons-triage{display:flex;gap:.5rem}
.btn-triage{flex:1;padding:.5rem;font-family:var(--police-mono);font-size:.75rem;border:1px solid var(--bordure);background:var(--panneau);color:var(--texte);cursor:pointer;border-radius:4px;transition:all .2s}
.btn-triage:hover{border-color:var(--ambre);color:var(--ambre)}
.btn-triage.choisi{background:rgba(244,162,97,.15);border-color:var(--ambre);color:var(--ambre)}
.resultat-triage{text-align:center;padding:.8rem;border-radius:6px;font-family:var(--police-mono);font-size:.9rem;font-weight:700;margin-top:.5rem}

.briefing-overlay,.debriefing-overlay{position:absolute;inset:0;z-index:50;background:rgba(8,12,20,.95);display:none;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.briefing-overlay.actif,.debriefing-overlay.actif{display:flex}
.briefing-contenu,.debriefing-contenu{max-width:650px;width:90%;padding:2.5rem;background:var(--panneau);border:1px solid var(--bordure);border-radius:12px}
.briefing-contenu h2,.debriefing-contenu h2{font-family:var(--police-titre);font-size:1.2rem;color:var(--rouge);letter-spacing:.15em;margin-bottom:1rem}
.briefing-contenu .icone-scenario{font-size:3rem;text-align:center;margin-bottom:1rem;display:block}
.briefing-contenu p,.debriefing-contenu p{font-size:.85rem;color:var(--texte);line-height:1.6;margin-bottom:.8rem}
.briefing-contenu .info-cle{background:var(--panneau2);padding:.8rem;border-radius:6px;border-left:3px solid var(--ambre);margin:.8rem 0;font-size:.8rem}
.briefing-contenu .info-cle strong{color:var(--ambre);font-family:var(--police-mono)}
.stat-grille{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:1rem 0}
.stat-item{background:var(--panneau2);padding:.8rem;border-radius:6px;text-align:center}
.stat-item .valeur{font-family:var(--police-titre);font-size:1.5rem;display:block;margin-bottom:.3rem}
.stat-item .label{font-family:var(--police-mono);font-size:.65rem;color:var(--texte2);letter-spacing:.1em}
.note-finale{text-align:center;margin:1.5rem 0}
.note-finale .note{font-family:var(--police-titre);font-size:3rem;letter-spacing:.1em}
.note-finale .rang{font-family:var(--police-mono);font-size:.9rem;color:var(--texte2);margin-top:.3rem}
.barre-progression-stat{height:6px;background:var(--panneau);border-radius:3px;overflow:hidden;margin:.3rem 0}
.barre-progression-stat div{height:100%;border-radius:3px;transition:width 1s ease-out}

.ressource-item{display:flex;justify-content:space-between;align-items:center;padding:.5rem .6rem;background:var(--panneau2);border-radius:4px;margin-bottom:.4rem;font-size:.8rem}
.ressource-item .nom-ressource{color:var(--texte)}
.ressource-item .qte-ressource{font-family:var(--police-mono);color:var(--ambre)}
.btn-plus-moins{width:24px;height:24px;border:1px solid var(--bordure);background:var(--panneau);color:var(--texte);cursor:pointer;border-radius:3px;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-plus-moins:hover{border-color:var(--bleu);color:var(--bleu)}
.controles-ressource{display:flex;align-items:center;gap:.3rem}

.evacuation-item{background:var(--panneau2);border:1px solid var(--bordure);border-radius:6px;padding:.6rem;margin-bottom:.5rem}
.evacuation-item .ligne-evac{display:flex;justify-content:space-between;align-items:center;font-size:.8rem}
.evacuation-item select{margin-top:.4rem}
.progression-evac{margin-top:.4rem}

@keyframes clignoter{0%,100%{opacity:1}50%{opacity:.4}}
.clignotant{animation:clignoter 1s ease-in-out infinite}

@keyframes glisser-entree{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.entree-animee{animation:glisser-entree .3s ease-out}

@media(max-width:900px){
#jeu.actif{grid-template-columns:1fr;grid-template-rows:50px 1fr 200px 140px}
.panneau-lateral{border-left:none;border-top:1px solid var(--bordure)}
.panneau-radio{grid-template-columns:1fr}
.actions-radio{border-left:none;border-top:1px solid var(--bordure);flex-direction:row;flex-wrap:wrap}
}
</style>
</head>
<body>

<div id="ecran-chargement">
<h1>MAJOR</h1>
<p style="color:var(--texte2);font-family:var(--police-mono);font-size:.8rem;letter-spacing:.3em;margin-bottom:2rem">SIMULATEUR D'ÉVÉNEMENT MAJEUR</p>
<div class="barre-chargement"><div id="progression-chargement"></div></div>
</div>

<div id="menu-principal">
<div class="menu-entete">
<h1>MAJOR</h1>
<p>SIMULATEUR D'INTERVENTION SUR ÉVÉNEMENT MAJEUR</p>
<div class="menu-difficulte">
<button class="btn-difficulte actif" data-difficulte="normal" onclick="choisirDifficulte('normal')">STANDARD</button>
<button class="btn-difficulte" data-difficulte="difficile" onclick="choisirDifficulte('difficile')">DIFFICILE</button>
<button class="btn-difficulte" data-difficulte="expert" onclick="choisirDifficulte('expert')">EXPERT</button>
</div>
</div>
<div class="grille-scenarios" id="grille-scenarios"></div>
</div>

<div id="jeu">
<div class="barre-superieure">
<div class="logo-barre">MAJOR</div>
<div class="info-phase">
<span class="etiquette-phase" id="etiquette-phase">1/6</span>
<span class="nom-phase" id="nom-phase">Briefing</span>
</div>
<div class="info-minuteur">
<div class="minuteur" id="minuteur">00:00</div>
<div class="score-affichage" id="score-affichage">0 PTS</div>
<button class="btn-quitter" onclick="quitterJeu()">QUITTER</button>
</div>
</div>

<div class="zone-carte">
<canvas id="carte-canvas"></canvas>
<div class="superposition-carte" id="legende-carte"></div>
<div class="info-survol" id="info-survol"></div>
<div class="compteur-victimes" id="compteur-victimes"></div>
</div>

<div class="panneau-lateral">
<div class="onglets-panneau" id="onglets-panneau">
<div class="onglet actif" data-onglet="action" onclick="changerOnglet('action')">ACTION</div>
<div class="onglet" data-onglet="victimes" onclick="changerOnglet('victimes')">VICTIMES</div>
<div class="onglet" data-onglet="ressources" onclick="changerOnglet('ressources')">MOYENS</div>
</div>
<div class="contenu-panneau" id="contenu-panneau">
<div class="section-panneau actif" id="panneau-action"></div>
<div class="section-panneau" id="panneau-victimes"></div>
<div class="section-panneau" id="panneau-ressources"></div>
</div>
</div>

<div class="panneau-radio">
<div class="journal-radio" id="journal-radio"></div>
<div class="actions-radio" id="actions-radio"></div>
</div>

<div class="briefing-overlay" id="briefing-overlay">
<div class="briefing-contenu" id="briefing-contenu"></div>
</div>
<div class="debriefing-overlay" id="debriefing-overlay">
<div class="debriefing-contenu" id="debriefing-contenu"></div>
</div>
</div>

<script>
const SCENARIOS = [
{

]

acces:'Rue de la République — périmètre police en place',
nbVictimes:{normal:18,difficile:28,expert:45},

effets:{fumee:true,feu:false,chimique:false},

elements:[

{type:'cratere',x:.3,y:.45,rayon:.06,couleur:'#5a3030'},
{type:'batiment',x:.6,y:.1,w:.15,h:.15,couleur:'#2d3748',label:'Commerce'},
{type:'batiment',x:.8,y:.15,w:.12,h:.12,couleur:'#2d3748',label:'Café'},
{type:'route',x:.0,y:.85,w:1,h:.06,couleur:'#1e2433'},
]
},
{
id:'chimique',nom:'Incident chimique',icone:'☣️',
lieu:'Zone industrielle — Usine ChemTech',
description:'Fuite de chlore gazeux dans l\'usine chimique suite à la rupture d\'une cuve. Un nuage verdâtre se déplace vers le nord-est. Personnel de l\'usine en cours d\'évacuation.',
risques:['Nuage toxique (chlore)','Zone NRBC','Vent nord-est 15 km/h'],
acces:'Route industrielle — approche vent de dos obligatoire (sud-ouest)',
nbVictimes:{normal:10,difficile:16,expert:25},
repartition:{t1:.3,t2:.3,t3:.25,dcd:.15},
effets:{fumee:false,feu:false,chimique:true},
zoneDanger:[{x:.1,y:.1,w:.45,h:.45},{x:.3,y:.15,w:.5,h:.4}],
couleurFond:'#0a120a',
elements:[

function jouerSon(type){
if(!audioCtx) return;
try{
const now = audioCtx.currentTime;
const gain = audioCtx.createGain();
gain.connect(audioCtx.destination);
if(type==='bip'){
const osc=audioCtx.createOscillator();osc.type='sine';osc.frequency.value=880;
gain.gain.setValueAtTime(.08,now);gain.gain.exponentialRampToValueAtTime(.001,now+.15);
osc.connect(gain);osc.start(now);osc.stop(now+.15);
}else if(type==='radio'){
const osc=audioCtx.createOscillator();osc.type='sawtooth';osc.frequency.value=200;
const filtre=audioCtx.createBiquadFilter();filtre.type='bandpass';filtre.frequency.value=1500;filtre.Q.value=5;
gain.gain.setValueAtTime(.04,now);gain.gain.exponentialRampToValueAtTime(.001,now+.3);
osc.connect(filtre);filtre.connect(gain);osc.start(now);osc.stop(now+.3);
}else if(type==='alerte'){
const osc=audioCtx.createOscillator();osc.type='square';
osc.frequency.setValueAtTime(600,now);osc.frequency.setValueAtTime(800,now+.1);osc.frequency.setValueAtTime(600,now+.2);
gain.gain.setValueAtTime(.06,now);gain.gain.exponentialRampToValueAtTime(.001,now+.4);
osc.connect(gain);osc.start(now);osc.stop(now+.4);
}else if(type==='succes'){
const osc=audioCtx.createOscillator();osc.type='sine';
osc.frequency.setValueAtTime(523,now);osc.frequency.setValueAtTime(659,now+.1);osc.frequency.setValueAtTime(784,now+.2);
gain.gain.setValueAtTime(.07,now);gain.gain.linearRampToValueAtTime(.07,now+.25);gain.gain.exponentialRampToValueAtTime(.001,now+.5);
osc.connect(gain);osc.start(now);osc.stop(now+.5);
}else if(type==='erreur'){
const osc=audioCtx.createOscillator();osc.type='sawtooth';
osc.frequency.setValueAtTime(200,now);osc.frequency.linearRampToValueAtTime(100,now+.3);
gain.gain.setValueAtTime(.06,now);gain.gain.exponentialRampToValueAtTime(.001,now+.4);
osc.connect(gain);osc.start(now);osc.stop(now+.4);
}else if(type==='sirene'){
const osc=audioCtx.createOscillator();osc.type='sine';
for(let i=0;i<4;i++){osc.frequency.setValueAtTime(600,now+i*.4);osc.frequency.linearRampToValueAtTime(900,now+i*.4+.2);osc.frequency.linearRampToValueAtTime(600,now+i*.4+.4);}
gain.gain.setValueAtTime(.04,now);gain.gain.setValueAtTime(.04,now+1.5);gain.gain.exponentialRampToValueAtTime(.001,now+1.7);
osc.connect(gain);osc.start(now);osc.stop(now+1.7);
}else if(type==='phase'){
const osc=audioCtx.createOscillator();osc.type='triangle';
osc.frequency.setValueAtTime(440,now);osc.frequency.setValueAtTime(660,now+.08);osc.frequency.setValueAtTime(880,now+.16);
gain.gain.setValueAtTime(.07,now);gain.gain.linearRampToValueAtTime(.07,now+.2);gain.gain.exponentialRampToValueAtTime(.001,now+.5);
osc.connect(gain);osc.start(now);osc.stop(now+.5);
}
}catch(e){}
}

function genererVictimes(scenario,difficulte){
const nb = scenario.nbVictimes[difficulte];
const rep = scenario.repartition;
const victimes = [];
const categories = [];
let nbT1=Math.round(nb*rep.t1),nbT2=Math.round(nb*rep.t2),nbT3=Math.round(nb*rep.t3),nbDcd=Math.round(nb*rep.dcd);
while(nbT1+nbT2+nbT3+nbDcd<nb)nbT3++;
while(nbT1+nbT2+nbT3+nbDcd>nb)nbT3--;
for(let i=0;i<nbT1;i++)categories.push('t1');
for(let i=0;i<nbT2;i++)categories.push('t2');
for(let i=0;i<nbT3;i++)categories.push('t3');
for(let i=0;i<nbDcd;i++)categories.push('dcd');
for(let i=categories.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[categories[i],categories[j]]=[categories[j],categories[i]];}
for(let i=0;i<nb;i++){
const cat = categories[i];
const sympts = SYMPTOMES[cat];
const sympt = sympts[Math.floor(Math.random()*sympts.length)];
const prenom = PRENOMS[Math.floor(Math.random()*PRENOMS.length)];
const age = cat==='t3'?Math.floor(Math.random()*60)+15 : Math.floor(Math.random()*70)+10;
const zoneX = .1+Math.random()*.55;
const zoneY = .15+Math.random()*.45;
victimes.push({
id:i+1,
prenom:prenom,
age:age,
categorieReelle:cat,
categorieJoueur:null,
triageFait:false,
symptomes:sympt.desc,
fr:sympt.fr,
pouls:sympt.pouls,
conscience:sympt.conscience,
x:zoneX,y:zoneY,
peutMarcher:cat==='t3',
evacue:false,
hopital:null,
ambulanceAssignee:false,
});
}
return victimes;
}

function dessinerRues(){
if(!etat.scenario)return;
const seed=etat.scenario.id.charCodeAt(0)+etat.scenario.id.charCodeAt(1)*7;
const rng=(n)=>(Math.sin(seed*9301+n*49297)*.5+.5);

const ruesH=[
{y:.92,w:1,label:'Route Principale',principale:true},
{y:.05,w:1,label:'',principale:false},
{y:.55+rng(0)*.1,w:.4+rng(1)*.3,xStart:rng(2)*.2,label:'',principale:false},

const ruesV=[
{x:.0,h:1,label:'',principale:false},
{x:.97,h:1,label:'',principale:false},
{x:.45+rng(3)*.15,h:.3+rng(4)*.4,yStart:rng(5)*.3,label:'',principale:false},
{x:.75+rng(6)*.1,h:.25+rng(7)*.3,yStart:.5+rng(8)*.2,label:'',principale:false},
];

ruesH.forEach(r=>{
const ry=r.y*hauteurCarte;
const rx=(r.xStart||0)*largeurCarte;
const rw=(r.w||1)*largeurCarte;

function regrouperVictimesPMA(){
if(!etat.pmaPosition)return;
const px=etat.pmaPosition.x;
const py=etat.pmaPosition.y;
const groupes={t1:[],t2:[],t3:[],dcd:[]};
etat.victimes.forEach(v=>{
const cat=v.categorieJoueur||'t3';
if(groupes[cat])groupes[cat].push(v);
else groupes.t3.push(v);
});
const offsets={t1:{dx:-.08,dy:-.06},t2:{dx:.08,dy:-.06},t3:{dx:.08,dy:.06},dcd:{dx:-.08,dy:.06}};
Object.keys(groupes).forEach(cat=>{
const victimesCat=groupes[cat];
const off=offsets[cat];
const baseX=px+off.dx;
const baseY=py+off.dy;
const cols=Math.ceil(Math.sqrt(victimesCat.length));
victimesCat.forEach((v,i)=>{
const col=i%cols;
const row=Math.floor(i/cols);
v.xOrigine=v.x;
v.yOrigine=v.y;
v.x=Math.max(.02,Math.min(.95,baseX+col*.025-(cols*.025/2)));
v.y=Math.max(.02,Math.min(.95,baseY+row*.03));
});
});
ajouterMessageRadio('systeme','Victimes regroupées au PMA par catégorie de triage.');
}

let musiqueNoeud=null;

function lancerMusiqueFond(){
if(!audioCtx)return;
try{
const gain=audioCtx.createGain();
gain.gain.value=0.03;
gain.connect(audioCtx.destination);
const lfo=audioCtx.createOscillator();
lfo.type='sine';lfo.frequency.value=0.15;
const lfoGain=audioCtx.createGain();
lfoGain.gain.value=8;
lfo.connect(lfoGain);
const drone=audioCtx.createOscillator();
drone.type='sine';drone.frequency.value=55;
lfoGain.connect(drone.frequency);
const drone2=audioCtx.createOscillator();
drone2.type='triangle';drone2.frequency.value=82.5;
const droneGain2=audioCtx.createGain();
droneGain2.gain.value=0.6;
drone2.connect(droneGain2);
const filtre=audioCtx.createBiquadFilter();
filtre.type='lowpass';filtre.frequency.value=200;filtre.Q.value=2;
const lfo2=audioCtx.createOscillator();
lfo2.type='sine';lfo2.frequency.value=0.08;
const lfo2Gain=audioCtx.createGain();
lfo2Gain.gain.value=50;
lfo2.connect(lfo2Gain);
lfo2Gain.connect(filtre.frequency);
drone.connect(filtre);
droneGain2.connect(filtre);
filtre.connect(gain);
const pulse=audioCtx.createOscillator();
pulse.type='sine';pulse.frequency.value=110;
const pulseGain=audioCtx.createGain();
pulseGain.gain.value=0;
const pulseLfo=audioCtx.createOscillator();
pulseLfo.type='square';pulseLfo.frequency.value=1.2;
const pulseLfoGain=audioCtx.createGain();
pulseLfoGain.gain.value=0.3;
pulseLfo.connect(pulseLfoGain);
pulseLfoGain.connect(pulseGain.gain);
pulse.connect(pulseGain);
pulseGain.connect(gain);
lfo.start();lfo2.start();drone.start();drone2.start();pulse.start();pulseLfo.start();
musiqueNoeud={gain,noeuds:[lfo,lfo2,drone,drone2,pulse,pulseLfo]};
}catch(e){}
}

function arreterMusique(){
if(musiqueNoeud){
try{
musiqueNoeud.gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+2);
setTimeout(()=>{
musiqueNoeud.noeuds.forEach(n=>{try{n.stop();}catch(e){}});
musiqueNoeud=null;
},2500);
}catch(e){}
}
}

function validerMethane(){
let score=0;let details=[];
if(etat.methane.m){score+=10;details.push('Major incident: ✓');}else details.push('Major incident: ✗');
const champsMethane=['e','t','h','a','n','e2'];
const elems=document.querySelectorAll('#panneau-action input, #panneau-action textarea, #panneau-action select');
elems.forEach(el=>{
const id=el.id.replace('methane-','');
if(el.value&&el.value.length>2){
etat.methane[id]=el.value;
}
});
if(etat.methane.e||document.getElementById('methane-e')?.value){score+=10;}
if(etat.methane.t||document.getElementById('methane-t')?.value){score+=10;}
if(etat.methane.h||document.getElementById('methane-h')?.value){score+=10;}
if(etat.methane.a||document.getElementById('methane-a')?.value){score+=10;}
const nEstime=parseInt(etat.methane.n||document.getElementById('methane-n')?.value);
if(nEstime){
const diff=Math.abs(nEstime-etat.victimes.length);
if(diff<=2)score+=20;
else if(diff<=5)score+=10;
else score+=5;
}
if(etat.methane.e2||document.getElementById('methane-e2')?.value){score+=10;}
ajouterScore(score,'Rapport METHANE ('+score+'/80)');
etat.scoresPhase.methane=score;
ajouterMessageRadio('sortant','César 41 pour CASU 144 — METHANE transmis.');
ajouterMessageRadio('entrant','CASU 144 reçu METHANE. Procédez au pré-triage des victimes. Des renforts sont en route.');
jouerSon('succes');
majPhase('triage');
}

<div style="background:rgba(67,97,238,.08);padding:.4rem .6rem;border-radius:4px;font-size:.75rem;grid-column:1/-1"><span style="color:var(--bleu);font-family:var(--police-mono)">Conscience:</span> <span style="color:var(--texte)">${v.conscience}</span></div>

${v.peutMarcher?'<div style="margin-top:.4rem;font-size:.75rem;color:var(--vert)">🚶 La victime se déplace / est debout</div>':'<div style="margin-top:.4rem;font-size:.75rem;color:var(--rouge)">🛑 La victime est au sol / immobile</div>'}
</div>
<div class="triage-start">
<h4>PROTOCOLE PRÉ-TRIAGE — Étape ${etape+1}</h4>`;
if(etape===0){
contenu+=`<div class="question-triage"><p>La victime peut-elle <strong>marcher</strong> ?</p>
<div class="boutons-triage">
<button class="btn-triage" onclick="repondreTriage(${v.id},0,true)">OUI — Marche</button>

</div></div>`;

contenu+=`<div class="question-triage"><p>La victime <strong>respire</strong>-t-elle spontanément ?</p>

function repondreTriage(idVictime,etape,reponse){
const v=etat.victimes.find(vi=>vi.id===idVictime);
if(!v)return;
if(etape===0&&reponse===true){
attribuerTriage(v,'t3');return;
}
if(etape===0&&reponse===false){
etat.triageEtape=1;afficherEtapeTriage(v);return;
}
if(etape===1&&reponse===false){
etat.triageEtape=2;afficherEtapeTriage(v);return;
}
if(etape===1&&reponse===true){
etat.triageEtape=3;afficherEtapeTriage(v);return;
}
if(etape===2&&reponse===false){
attribuerTriage(v,'dcd');return;
}
if(etape===2&&reponse===true){
etat.triageEtape=3;afficherEtapeTriage(v);return;
}
if(etape===3&&reponse===true){
attribuerTriage(v,'t1');return;
}
if(etape===3&&reponse===false){
etat.triageEtape=4;afficherEtapeTriage(v);return;
}
if(etape===4&&reponse===false){
attribuerTriage(v,'t1');return;
}
if(etape===4&&reponse===true){
etat.triageEtape=5;afficherEtapeTriage(v);return;
}
if(etape===5&&reponse===false){
attribuerTriage(v,'t1');return;
}
if(etape===5&&reponse===true){
attribuerTriage(v,'t2');return;
}
}

function attribuerTriage(v,categorie){
v.categorieJoueur=categorie;
v.triageFait=true;
const correct=categorie===v.categorieReelle;
if(correct){
ajouterScore(15,'Triage correct — Victime #'+v.id);
jouerSon('succes');
}else{
ajouterScore(3,'Triage incorrect — Victime #'+v.id+' ('+nomCategorie(v.categorieReelle)+' → '+nomCategorie(categorie)+')');
jouerSon('erreur');
}
etat.triageEnCours=null;
etat.triageEtape=0;
majCompteurVictimes();
majPanneauAction();
majPanneauVictimes();
const trie=etat.victimes.filter(vi=>vi.triageFait).length;
if(trie===etat.victimes.length){
ajouterMessageRadio('systeme','Triage de toutes les victimes terminé.');
}
}

const parCategorie={t1:[],t2:[],t3:[],dcd:[],nonTrie:[]};

if(v.evacue)return;
if(v.categorieJoueur)parCategorie[v.categorieJoueur].push(v);
else parCategorie.nonTrie.push(v);

function evacuerVictime(idVictime,parHelico){
const v=etat.victimes.find(vi=>vi.id===idVictime);
if(!v)return;
const hopitalIdx=parseInt(document.getElementById('select-hopital').value);
const hopital=HOPITAUX[hopitalIdx];
if(parHelico){
if(etat.helicopteres.length===0)return;
var heliIdUtilise=etat.helicopteres[0].id;
etat.helicopteres.splice(0,1);
}else{
if(etat.ressources.ambulances<=0)return;
etat.ressources.ambulances--;
}
v.evacue=true;
v.hopital=hopital.nom;
hopital.capacite--;
const evac={victimeId:v.id,hopital:hopital.nom,enCours:false,depart:etat.temps,dureeRetour:0,parHelico:!!parHelico,heliId:parHelico?heliIdUtilise:null};
etat.evacuations.push(evac);
const bonus = v.categorieJoueur==='t1'?20:v.categorieJoueur==='t2'?15:10;
const ordreCorrect = !etat.victimes.some(vi=>!vi.evacue&&vi.categorieJoueur==='t1'&&v.categorieJoueur!=='t1');
const moyen=parHelico?`🚁 REGA ${heliIdUtilise}`:'🚑';
if(ordreCorrect)ajouterScore(bonus+5+(parHelico?5:0),'Évacuation prioritaire correcte — #'+v.id);
else ajouterScore(bonus,'Évacuation — #'+v.id);
ajouterMessageRadio('sortant',`César 41 pour CASU 144 — Évac ${moyen} victime #${v.id} (${nomCategorie(v.categorieJoueur)}) → ${hopital.nom}`);
if(!parHelico){
ajouterMessageRadio('systeme',`🚑 Ambulance partie → ${hopital.nom}. Demandez un renfort si nécessaire.`);
}else{
ajouterMessageRadio('systeme',`🚁 REGA ${heliIdUtilise} parti → ${hopital.nom}. Demandez un renfort si nécessaire.`);
}
jouerSon('bip');
etat.victimeSelectionnee=null;
majPanneauAction();
majPanneauVictimes();
majCompteurVictimes();
majPanneauRessources();
majBoutonsRadio();
}

function terminerPartie(){
if(etat.minuteurId)clearInterval(etat.minuteurId);
arreterMusique();
const overlay=document.getElementById('debriefing-overlay');
const contenu=document.getElementById('debriefing-contenu');
overlay.classList.add('actif');
const triageCorrects=etat.victimes.filter(v=>v.categorieJoueur===v.categorieReelle).length;
const pctTriage=Math.round(triageCorrects/etat.victimes.length*100);
const evacues=etat.victimes.filter(v=>v.evacue).length;
const vivants=etat.victimes.filter(v=>v.categorieReelle!=='dcd').length;
const pctEvac=Math.round(evacues/Math.max(vivants,1)*100);
const tempsMin=Math.floor(etat.temps/60);
const tempsSec=etat.temps%60;
let bonus=0;
if(etat.temps<300)bonus+=50;
else if(etat.temps<600)bonus+=25;
if(pctTriage>=90)bonus+=40;
else if(pctTriage>=70)bonus+=20;
if(pctEvac>=90)bonus+=30;
ajouterScore(bonus,'Bonus performance');
const scoreMax = etat.victimes.length*15+80+30+20+etat.victimes.filter(v=>v.categorieReelle!=='dcd').length*25+50+40+30+50;
const pctScore=Math.min(100,Math.round(etat.score/scoreMax*100));
let rang='F',couleurRang='var(--dcd)';
if(pctScore>=90){rang='S';couleurRang='var(--ambre)';}
else if(pctScore>=80){rang='A';couleurRang='var(--vert)';}
else if(pctScore>=65){rang='B';couleurRang='var(--bleu)';}
else if(pctScore>=50){rang='C';couleurRang='var(--texte)';}
else if(pctScore>=35){rang='D';couleurRang='var(--t2)';}
else{rang='F';couleurRang='var(--rouge)';}
jouerSon('succes');
contenu.innerHTML=`
<h2>DÉBRIEFING</h2>
<p style="color:var(--texte2)">${etat.scenario.nom} — Difficulté: ${etat.difficulte.toUpperCase()}</p>
<div class="note-finale">
<div class="note" style="color:${couleurRang}">${rang}</div>
<div class="rang">${etat.score} points — ${pctScore}%</div>
</div>
<div class="stat-grille">
<div class="stat-item"><span class="valeur" style="color:var(--ambre)">${tempsMin}:${tempsSec.toString().padStart(2,'0')}</span><span class="label">TEMPS TOTAL</span></div>
<div class="stat-item"><span class="valeur" style="color:var(--vert)">${pctTriage}%</span><span class="label">TRIAGE CORRECT</span></div>
<div class="stat-item"><span class="valeur" style="color:var(--bleu)">${evacues}/${vivants}</span><span class="label">ÉVACUÉS</span></div>
<div class="stat-item"><span class="valeur" style="color:var(--blanc)">${etat.victimes.length}</span><span class="label">VICTIMES TOTALES</span></div>
</div>
<p style="font-size:.8rem;color:var(--texte2);margin-top:1rem"><strong style="color:var(--blanc)">Triage:</strong> ${triageCorrects}/${etat.victimes.length} catégorisations correctes</p>
<div class="barre-progression-stat"><div style="width:${pctTriage}%;background:${pctTriage>=70?'var(--vert)':'var(--rouge)'}"></div></div>
<p style="font-size:.8rem;color:var(--texte2);margin-top:.5rem"><strong style="color:var(--blanc)">Évacuation:</strong> ${pctEvac}% des victimes vivantes évacuées</p>
<div class="barre-progression-stat"><div style="width:${pctEvac}%;background:${pctEvac>=70?'var(--vert)':'var(--rouge)'}"></div></div>
<p style="font-size:.8rem;color:var(--texte2);margin-top:.5rem"><strong style="color:var(--blanc)">METHANE:</strong> ${etat.scoresPhase.methane||0}/80 points</p>
<div class="barre-progression-stat"><div style="width:${(etat.scoresPhase.methane||0)/80*100}%;background:var(--bleu)"></div></div>
<p style="font-size:.8rem;color:var(--texte2);margin-top:.5rem"><strong style="color:var(--blanc)">Rapport de conduite:</strong> ${etat.scoresPhase.rapport||0}/120 points</p>
<div class="barre-progression-stat"><div style="width:${(etat.scoresPhase.rapport||0)/120*100}%;background:var(--ambre)"></div></div>
<div style="display:flex;gap:.8rem;margin-top:1.5rem">
<button class="btn-action principal" onclick="rejouer()" style="flex:1">REJOUER</button>
<button class="btn-action secondaire" onclick="retourMenu()" style="flex:1">MENU</button>

}

function demarrer(){
const barre=document.getElementById('progression-chargement');
let prog=0;
const interval=setInterval(()=>{
prog+=Math.random()*15+5;
if(prog>=100){
prog=100;
clearInterval(interval);
setTimeout(()=>{
document.getElementById('ecran-chargement').classList.add('masque');
document.getElementById('menu-principal').classList.add('actif');
construireMenu();
},500);
}
barre.style.width=prog+'%';
},150);
}

function evaluerRapport(){
let scoreRapport=0;
let details=[];
const cReelles={t1:0,t2:0,t3:0,dcd:0};
etat.victimes.forEach(v=>{if(v.categorieReelle)cReelles[v.categorieReelle]++;});
const cJoueur={t1:0,t2:0,t3:0,dcd:0};
etat.victimes.forEach(v=>{if(v.categorieJoueur)cJoueur[v.categorieJoueur]++;});
const evacuesReel=etat.victimes.filter(v=>v.evacue).length;
const tempsReelMin=Math.floor(etat.temps/60);
const hopitauxReels=[...new Set(etat.evacuations.map(e=>e.hopital))];
const heliUtilise=etat.evacuations.some(e=>e.parHelico);

const val=id=>document.getElementById(id)?.value?.trim()||'';
const num=id=>parseInt(document.getElementById(id)?.value)||0;

const indicatif=val('rapport-indicatif').toLowerCase();
if(indicatif.includes('césar')||indicatif.includes('cesar')||indicatif.includes('41')){scoreRapport+=10;details.push('✓ Indicatif correct');}
else if(indicatif.length>0){scoreRapport+=3;details.push('△ Indicatif renseigné mais incorrect');}
else{details.push('✗ Indicatif manquant');}

const role=val('rapport-role').toLowerCase();
if(role.includes('leader')||role.includes('ambulancier leader')){scoreRapport+=10;details.push('✓ Rôle correct');}
else if(role.length>0){scoreRapport+=3;details.push('△ Rôle renseigné mais imprécis');}
else{details.push('✗ Rôle manquant');}

const typeEvt=val('rapport-type').toLowerCase();
const nomScenario=etat.scenario.nom.toLowerCase();
const motsCles=nomScenario.split(/[\s']/);
if(motsCles.some(m=>m.length>3&&typeEvt.includes(m))){scoreRapport+=10;details.push('✓ Type d\'événement correct');}
else if(typeEvt.length>0){scoreRapport+=3;details.push('△ Type renseigné mais imprécis');}
else{details.push('✗ Type manquant');}

const lieu=val('rapport-lieu');
if(lieu.length>5){scoreRapport+=5;details.push('✓ Lieu renseigné');}
else{details.push('✗ Lieu manquant');}

const nbTotal=num('rapport-nb-total');
if(nbTotal===etat.victimes.length){scoreRapport+=15;details.push('✓ Nombre total exact');}
else if(Math.abs(nbTotal-etat.victimes.length)<=2){scoreRapport+=8;details.push('△ Nombre total proche (±2)');}
else if(nbTotal>0){scoreRapport+=3;details.push('✗ Nombre total inexact');}
else{details.push('✗ Nombre total manquant');}

const nbT1=num('rapport-nb-t1');
const nbT2=num('rapport-nb-t2');
const nbT3=num('rapport-nb-t3');
const nbDcd=num('rapport-nb-dcd');
let bilanScore=0;
if(nbT1===cJoueur.t1)bilanScore+=3;else if(Math.abs(nbT1-cJoueur.t1)<=1)bilanScore+=1;
if(nbT2===cJoueur.t2)bilanScore+=3;else if(Math.abs(nbT2-cJoueur.t2)<=1)bilanScore+=1;
if(nbT3===cJoueur.t3)bilanScore+=3;else if(Math.abs(nbT3-cJoueur.t3)<=1)bilanScore+=1;
if(nbDcd===cJoueur.dcd)bilanScore+=3;else if(Math.abs(nbDcd-cJoueur.dcd)<=1)bilanScore+=1;
scoreRapport+=bilanScore;
if(bilanScore>=10)details.push('✓ Répartition triage précise');
else if(bilanScore>=6)details.push('△ Répartition triage approximative');
else details.push('✗ Répartition triage inexacte');

const nbEvac=num('rapport-nb-evac');
if(nbEvac===evacuesReel){scoreRapport+=10;details.push('✓ Nombre d\'évacuations exact');}
else if(Math.abs(nbEvac-evacuesReel)<=2){scoreRapport+=5;details.push('△ Évacuations proches (±2)');}
else if(nbEvac>0){scoreRapport+=2;details.push('✗ Évacuations inexactes');}

const rAmb=num('rapport-amb');
const rPompiers=num('rapport-pompiers');
const rPolice=num('rapport-police');
let moyensScore=0;
if(rAmb===etat.ressources.ambulances)moyensScore+=3;else if(Math.abs(rAmb-etat.ressources.ambulances)<=1)moyensScore+=1;
if(rPompiers===etat.ressources.pompiers)moyensScore+=2;else if(Math.abs(rPompiers-etat.ressources.pompiers)<=1)moyensScore+=1;
if(rPolice===etat.ressources.police)moyensScore+=2;else if(Math.abs(rPolice-etat.ressources.police)<=1)moyensScore+=1;
scoreRapport+=moyensScore;
if(moyensScore>=8)details.push('✓ Moyens engagés exacts');
else if(moyensScore>=4)details.push('△ Moyens approximatifs');
else details.push('✗ Moyens inexacts');

const heliReponse=val('rapport-heli');
if((heliReponse==='oui'&&heliUtilise)||(heliReponse==='non'&&!heliUtilise)){scoreRapport+=5;details.push('✓ Hélicoptère correct');}
else if(heliReponse==='oui'&&etat.dzPlace){scoreRapport+=3;details.push('△ Hélicoptère: DZ posée mais pas utilisé pour évacuation');}else if(heliReponse){scoreRapport+=1;details.push('✗ Hélicoptère incorrect');}

const hopitauxSaisis=val('rapport-hopitaux').toLowerCase();
let hopScore=0;
hopitauxReels.forEach(h=>{
const mots=h.toLowerCase().split(/\s+/);
if(mots.some(m=>m.length>3&&hopitauxSaisis.includes(m)))hopScore++;
});
if(hopScore>=hopitauxReels.length&&hopitauxReels.length>0){scoreRapport+=10;details.push('✓ Hôpitaux tous identifiés');}
else if(hopScore>0){scoreRapport+=Math.round(10*hopScore/hopitauxReels.length);details.push(`△ ${hopScore}/${hopitauxReels.length} hôpitaux identifiés`);}
else if(hopitauxSaisis.length>0){scoreRapport+=2;details.push('✗ Hôpitaux non reconnus');}
else{details.push('✗ Hôpitaux non renseignés');}

const dureeEstimee=num('rapport-duree');
if(Math.abs(dureeEstimee-tempsReelMin)<=1){scoreRapport+=10;details.push('✓ Durée exacte');}
else if(Math.abs(dureeEstimee-tempsReelMin)<=3){scoreRapport+=5;details.push('△ Durée approximative');}
else if(dureeEstimee>0){scoreRapport+=2;details.push('✗ Durée inexacte');}
else{details.push('✗ Durée manquante');}

const difficultes=val('rapport-difficultes');
const positifs=val('rapport-positifs');
const ameliorations=val('rapport-ameliorations');
let analyseScore=0;
if(difficultes.length>=15)analyseScore+=5;else if(difficultes.length>0)analyseScore+=2;
if(positifs.length>=15)analyseScore+=5;else if(positifs.length>0)analyseScore+=2;
if(ameliorations.length>=15)analyseScore+=5;else if(ameliorations.length>0)analyseScore+=2;
scoreRapport+=analyseScore;
if(analyseScore>=12)details.push('✓ Analyse complète et détaillée');
else if(analyseScore>=6)details.push('△ Analyse partielle');
else details.push('✗ Analyse insuffisante');

const scoreMax=120;
etat.scoresPhase.rapport=scoreRapport;
ajouterScore(scoreRapport,'Rapport de conduite ('+scoreRapport+'/'+scoreMax+')');
ajouterMessageRadio('systeme','— Rapport de conduite soumis au PC —');
jouerSon('succes');

const overlay=document.getElementById('briefing-overlay');
const contenu=document.getElementById('briefing-contenu');
overlay.classList.add('actif');
const pct=Math.round(scoreRapport/scoreMax*100);
let couleur=pct>=75?'var(--vert)':pct>=50?'var(--ambre)':'var(--rouge)';
contenu.innerHTML=`
<h2>📋 ÉVALUATION DU RAPPORT</h2>
<p style="color:var(--texte2);margin-bottom:1rem">Rapport de conduite — ${etat.scenario.nom}</p>
<div style="text-align:center;margin:1rem 0">
<span style="font-family:var(--police-titre);font-size:2.2rem;color:${couleur}">${scoreRapport}</span>
<span style="font-family:var(--police-mono);font-size:1rem;color:var(--texte2)"> / ${scoreMax} pts</span>
<div class="barre-progression-stat" style="margin-top:.5rem"><div style="width:${pct}%;background:${couleur}"></div></div>
</div>
<div style="background:var(--panneau2);border-radius:6px;padding:.8rem;margin:1rem 0;max-height:200px;overflow-y:auto">
${details.map(d=>{
const c=d.startsWith('✓')?'var(--vert)':d.startsWith('△')?'var(--ambre)':'var(--rouge)';
return `<p style="font-size:.75rem;color:${c};margin-bottom:.3rem;font-family:var(--police-mono)">${d}</p>`;
}).join('')}
</div>
<div style="background:var(--panneau2);border-radius:6px;padding:.8rem;margin:1rem 0">
<p style="font-family:var(--police-mono);font-size:.7rem;color:var(--texte2);margin-bottom:.5rem;letter-spacing:.1em">DONNÉES RÉELLES DE L'INTERVENTION</p>
<p style="font-size:.75rem;color:var(--texte)">Victimes: ${etat.victimes.length} (R:${cJoueur.t1} J:${cJoueur.t2} V:${cJoueur.t3} DCD:${cJoueur.dcd})</p>
<p style="font-size:.75rem;color:var(--texte)">Évacuées: ${evacuesReel} | Durée: ${tempsReelMin}min${(etat.temps%60).toString().padStart(2,'0')}</p>
<p style="font-size:.75rem;color:var(--texte)">Moyens: ${etat.ressources.ambulances} amb, ${etat.ressources.pompiers} pomp, ${etat.ressources.police} pol${heliUtilise?' + '+etat.evacuations.filter(e=>e.parHelico).length+' évac. hélico':''}</p>
<p style="font-size:.75rem;color:var(--texte)">Hôpitaux: ${hopitauxReels.join(', ')||'Aucun'}</p>
</div>
<button class="btn-action principal" onclick="fermerRapportEtTerminer()" style="margin-top:.5rem">VOIR LE DÉBRIEFING FINAL →</button>`;
}

function fermerRapportEtTerminer(){
document.getElementById('briefing-overlay').classList.remove('actif');
terminerPartie();
}

demarrer();
</script>
